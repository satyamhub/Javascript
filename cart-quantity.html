<!doctype html>
<html>
  <head>
    <title>Cart Quantity</title>
    <body>
      <button onclick="console.log(`Cart Quantity:${cartQuantity}`)">
        Show Quantity
      </button>
      <button
        onclick="
          cartQuantity += 1;
          console.log(`Cart Quantity:${cartQuantity}`);
        "
      >
        Add to Cart
      </button>
      <button
        onclick="
          cartQuantity += 2;
          console.log(`Cart Quantity:${cartQuantity}`);
        "
      >
        +2
      </button>
      <button
        onclick="
          cartQuantity += 3;
          console.log(`Cart Quantity:${cartQuantity}`);
        "
      >
        +3
      </button>
      <button
        onclick="
          cartQuantity = 0;
          console.log(`Cart Quantity is Reset`);
          console.log(`Cart Quantity:${cartQuantity}`);
        "
      >
        Reset Cart
      </button>
    </body>
    <script>
      let cartQuantity = 0;
    </script>
  </head>
</html>
