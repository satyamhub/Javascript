<!doctype html>
<html>
  <head>
    <title>TODO LIST</title>
    <link rel="stylesheet" href="style/todo-list.css" />
  </head>
  <body>
    <p>Todo List</p>
    <div class="todo-input-grid">
      <input
        placeholder="Todo name"
        class="js-name-input name-input"
        onkeydown="handleTodoKeydown(event)"
      />
      <input type="date" class="js-date-input date-input" />
      <button onclick="addTodo()" class="add-todo-button">Add</button>
    </div>

    <div class="js-todo-list todo-grid"></div>

    <script src="script/todo-list.js"></script>
  </body>
</html>
