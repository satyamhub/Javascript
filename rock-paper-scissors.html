<!doctype html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="./style/rock-paper-scissors.css" />
  </head>

  <body>
    <p class="title">Rock Paper Scissors</p>
    <button onclick="playGame('Rock')" class="move-button">
      <img src="./images/Rock-emoji.png" class="move-icon" />
    </button>
    <button onclick="playGame('Paper')" class="move-button">
      <img src="./images/Paper-emoji.png" class="move-icon" />
    </button>
    <button onclick="playGame('Scissors')" class="move-button">
      <img src="./images/Scissors-emoji.png" class="move-icon" />
    </button>
    <p class="js-result result"></p>
    <p class="js-move"></p>
    <p class="js-score score"></p>
    <button onclick="resetScore()" class="reset-score-button">
      Reset Score
    </button>
    <button onclick="autoPlay()" class="js-autoplay-button  autoplay-button">AutoPlay</button>
    <script src="./script/rock-paper-scissors.js"></script>
  </body>
</html>
