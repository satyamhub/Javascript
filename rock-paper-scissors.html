<!doctype html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <p>Rock Paper Scissors</p>
    <button onclick="playGame('Rock')">Rock</button>
    <button onclick="playGame('Paper')">Paper</button>
    <button onclick="playGame('Scissors')">Scissors</button>
    <button onclick="resetScore()">Reset Score</button>
    <p></p>

    <script>
      let score = JSON.parse(localStorage.getItem("score")) || {
        wins: 0,
        losses: 0,
        ties: 0,
      };

      updateScoreElement();

      function playGame(playerMove) {
        const randomNumber = Math.random();
        let computerMove = "";

        if (randomNumber < 1 / 3) {
          computerMove = "Rock";
        } else if (randomNumber < 2 / 3) {
          computerMove = "Paper";
        } else {
          computerMove = "Scissors";
        }

        let result = "";

        if (playerMove === "Rock") {
          if (computerMove === "Rock") {
            result = "Tie";
          } else if (computerMove === "Paper") {
            result = "You Lose";
          } else {
            result = "You Win";
          }
        } else if (playerMove === "Paper") {
          if (computerMove === "Rock") {
            result = "You Win";
          } else if (computerMove === "Paper") {
            result = "Tie";
          } else {
            result = "You Lose";
          }
        } else if (playerMove === "Scissors") {
          if (computerMove === "Rock") {
            result = "You Lose";
          } else if (computerMove === "Paper") {
            result = "You Win";
          } else {
            result = "Tie";
          }
        }

        if (result == "You Win") {
          score.wins += 1;
        } else if (result == "You Lose") {
          score.losses += 1;
        } else if (result == "Tie") {
          score.ties += 1;
        }
        localStorage.setItem("score", JSON.stringify(score));
        updateScoreElement();
        alert(
          `You picked ${playerMove}. Computer picked ${computerMove}. ${result} 
           Wins: ${score.wins}    
           Losses: ${score.losses}, 
           Ties: ${score.ties} 
          `,
        );
      }

      function resetScore() {
        score.wins = 0;
        score.losses = 0;
        score.ties = 0;
        localStorage.setItem("score", JSON.stringify(score));
        updateScoreElement();
        alert("Score Reset");
      }

      function updateScoreElement() {
        document.p = `Rock Paper Scissors - Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;
      }
    </script>
  </body>
</html>
